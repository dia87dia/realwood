# Настройки сборки Netlify
[build]
  functions = "netlify/functions"
  publish = "."

# Плагин для автоматической установки зависимостей функций перед деплоем
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Перенаправления (опционально, для удобства обращения к API)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
